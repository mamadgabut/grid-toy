name: Learn GitHub Actions
on: [push] # Ini pemicunya: setiap kali lu klik 'Commit', script jalan

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Cek koneksi ke Token
        env:
          MY_TOKEN_ACCESS: ${{ secrets.MY_SECRET_TOKEN }} # Ini manggil secret lu
        run: |
          if [ -n "$MY_TOKEN_ACCESS" ]; then
            echo "Berhasil: Secret MY_TOKEN terdeteksi!"
          else
            echo "Gagal: Secret MY_TOKEN tidak ditemukan."
            exit 1
          fi
